AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Biblio API – auth, books, libraries

Globals:
  Function:
    Runtime: provided.al2
    Architectures: [x86_64]
    Timeout: 5
    MemorySize: 256
    Environment:
      Variables:
        GOOGLE_BOOKS_API_TOKEN: !Ref GoogleBooksApiToken
        ISBNDB_API_KEY: !Ref IsbnDbApiKey
        MONGO_DBNAME: !Ref MongoDbname
        MONGO_URL: !Ref MongoUrl
    # Optional: replace with API Key / IAM / Lambda authorizer for auth
    # Events:
    #   HttpApi:
    #     Auth:
    #       ApiKeyRequired: true

Parameters:
  GoogleBooksApiToken:
    Type: String
    NoEcho: true
  IsbnDbApiKey:
    Type: String
    NoEcho: true
  MongoDbname:
    Type: String
  MongoUrl:
    Type: String
    NoEcho: true

Resources:
  BiblioHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Description: Biblio API Gateway

  # --- auth ---
  AuthSendOtp:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/AuthSendOtp
      Handler: bootstrap
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ses:SendEmail
              Resource: '*'
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /auth/sendOtp
            Method: POST
      Environment:
        Variables:
          AWS_SES_REGION: us-east-1

  AuthVerifyOtp:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/AuthVerifyOtp
      Handler: bootstrap
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /auth/verifyOtp
            Method: POST

  # --- books ---
  BooksGetBookByIsbn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/BooksGetBookByIsbn
      Handler: bootstrap
      Events:
        ApiGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /books/getBookByIsbn
            Method: GET

  BooksSearchBooks:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/BooksSearchBooks
      Handler: bootstrap
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /books/searchBooks
            Method: POST

  # --- libraries ---
  LibrariesCreateLibrary:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/LibrariesCreateLibrary
      Handler: bootstrap
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /libraries/createLibrary
            Method: POST

  LibrariesGetLibraries:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/LibrariesGetLibraries
      Handler: bootstrap
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /libraries/getLibraries
            Method: POST

  LibrariesUpdateLibrary:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/LibrariesUpdateLibrary
      Handler: bootstrap
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /libraries/updateLibrary
            Method: POST

  LibrariesDeleteLibrary:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/LibrariesDeleteLibrary
      Handler: bootstrap
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BiblioHttpApi
            Path: /libraries/deleteLibrary
            Method: POST

Outputs:
  ApiUrl:
    Description: Base URL of the HTTP API (use this as BIBLIO_API_URL in the app)
    Value: !Sub
      - 'https://${ApiId}.execute-api.${Region}.amazonaws.com'
      - { ApiId: !Ref BiblioHttpApi, Region: !Ref AWS::Region }
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'
